<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVerse Direct</title>
    <meta name="description" content="Busca y explora el metaverso de animes de forma rápida y directa.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="logo-container">
            <h1 class="logo-text">AnimeVerse <span class="accent">Direct</span></h1>
        </div>
        <form id="search-form" class="search-form">
            <input type="text" id="search-input" placeholder="Buscar anime (ej. Naruto...)" autocomplete="off" required>
            <button type="submit" class="search-btn" aria-label="Buscar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </form>
    </header>

    <main class="main-content">
        <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <p>Buscando en el metaverso...</p>
        </div>
        <div id="error-message" class="error-message hidden"></div>
        
        <section id="results-grid" class="results-grid">
            <!-- Las tarjetas se inyectarán aquí dinámicamente -->
        </section>
        
        <div id="initial-state" class="initial-state">
            <div class="initial-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </div>
            <h2>Explora tu próximo anime favorito</h2>
            <p>Usa la barra de búsqueda de arriba para comenzar tu viaje.</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
